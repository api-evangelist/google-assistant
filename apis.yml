name: Google Assistant API
description: >-
  The Google Assistant API enables developers to embed the Google Assistant into
  devices and applications. It provides conversational interfaces through gRPC
  and REST endpoints for sending text or audio queries and receiving responses.
  The API supports device model and instance registration, custom Actions with
  intents and scenes, and the Actions SDK for building conversational
  experiences that extend the Assistant's capabilities.
